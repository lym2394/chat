<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Ai-API对话 · Web跳转</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f0f9ff 0%, #e6f2fc 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .jump-card {
      max-width: 520px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 36px;
      box-shadow: 0 20px 35px -8px rgba(0, 80, 140, 0.12), 0 8px 18px -6px rgba(0, 120, 200, 0.08);
      padding: 36px 28px 40px;
      border: 1px solid rgba(70, 150, 240, 0.15);
      backdrop-filter: blur(2px);
      transition: transform 0.25s ease;
    }

    .jump-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 28px 40px -12px rgba(0, 105, 180, 0.18);
    }

    .title-section {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #1b6eb0 0%, #2a86da 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
      text-shadow: 0 2px 6px rgba(0, 110, 220, 0.08);
      word-break: break-word;
    }

    .subhead {
      color: #3f7fb2;
      font-size: 1rem;
      font-weight: 450;
      letter-spacing: 0.3px;
      padding: 6px 14px;
      background: rgba(210, 235, 255, 0.7);
      display: inline-block;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(80, 160, 250, 0.2);
      margin-top: 8px;
    }

    .jump-buttons {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin: 36px 0 22px;
    }

    .jump-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(255, 255, 255, 0.9);
      border: 1.8px solid rgba(70, 160, 250, 0.35);
      border-radius: 60px;
      box-shadow: 0 8px 14px -6px rgba(30, 120, 210, 0.12);
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      backdrop-filter: blur(8px);
    }

    .jump-btn:hover {
      background: #ffffff;
      border-color: #3f9eff;
      box-shadow: 0 12px 20px -8px #1e88e5a0;
      transform: scale(1.01) translateY(-2px);
    }

    .jump-btn:active {
      transform: scale(0.99);
      background: #e9f3ff;
      border-color: #1a73e8;
      box-shadow: 0 5px 10px -3px #0d47a180;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .service-label {
      font-size: 1.5rem;
      font-weight: 650;
      color: #105a9e;
      line-height: 1.3;
      letter-spacing: -0.2px;
    }

    .service-desc {
      font-size: 0.9rem;
      color: #367fbb;
      font-weight: 440;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .arrow-icon {
      background: #d9ebff;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0e6bc0;
      font-size: 28px;
      font-weight: 300;
      transition: all 0.15s;
      border: 1px solid #b3d6ff;
      box-shadow: inset 0 1px 2px white, 0 4px 6px -2px #9ac0e8;
    }

    .jump-btn:hover .arrow-icon {
      background: #b8d9ff;
      color: #054a91;
      transform: translateX(5px);
      box-shadow: inset 0 0 0 1px white, 0 6px 8px -3px #1e6ab3;
    }

    .deepseek .service-label {
      color: #0d4e7e;
    }

    .n1n .service-label {
      color: #0d5e8c;
    }

    .footnote {
      margin-top: 30px;
      text-align: center;
      color: #3677ae;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footnote span {
      background: rgba(255, 255, 255, 0.75);
      padding: 6px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 0.5px solid #bedcff;
      color: #1e5f92;
      font-weight: 450;
    }

    .footnote i {
      font-style: normal;
      background: #d2e6ff;
      width: 28px;
      height: 28px;
      border-radius: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #0b5fa5;
    }

    @media (max-width: 480px) {
      .jump-card {
        padding: 28px 20px 32px;
        border-radius: 32px;
      }

      h1 {
        font-size: 2rem;
      }

      .service-label {
        font-size: 1.3rem;
      }

      .arrow-icon {
        width: 44px;
        height: 44px;
        font-size: 26px;
      }

      .jump-btn {
        padding: 16px 20px;
      }
    }

    .bg-badge {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 0;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      background: #7bb9fe;
      border-radius: 20px;
      opacity: 0.5;
    }

    .divider {
      margin: 6px 0 0;
    }
  </style>
</head>
<body>
  <div class="jump-card">
    <div class="title-section">
      <h1>Ai-API对话</h1>
      <div class="subhead">Web 跳转 · 即点即达</div>
    </div>

    <div class="jump-buttons">
      <a href="/deepseek-chat/" class="jump-btn deepseek" target="_self" rel="noopener">
        <div class="btn-text">
          <span class="service-label">DeepSeek · 对话</span>
          <span class="service-desc">
            <span style="display: inline-block; width: 6px; height: 6px; background: #1e88e5; border-radius: 10px; margin-right: 6px;"></span>
            /deepseek-chat/
          </span>
        </div>
        <div class="arrow-icon" aria-hidden="true">→</div>
      </a>

      <a href="/n1n-chat/" class="jump-btn n1n" target="_self" rel="noopener">
        <div class="btn-text">
          <span class="service-label">N1N · 对话</span>
          <span class="service-desc">
            <span style="display: inline-block; width: 6px; height: 6px; background: #3b8bc0; border-radius: 10px; margin-right: 6px;"></span>
            /n1n-chat/
          </span>
        </div>
        <div class="arrow-icon" aria-hidden="true">→</div>
      </a>
    </div>

    <div class="footnote">
      <span>⚡ 快速访问 API 对话</span>
      <i>⌵</i>
    </div>

    <div class="bg-badge">
      <div class="badge-dot"></div>
      <div class="badge-dot" style="background: #4699f0;"></div>
      <div class="badge-dot" style="background: #a0c8ff;"></div>
    </div>
    <div class="divider"></div>
  </div>

  <script>
    (function() {
      const buttons = document.querySelectorAll('.jump-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function(e) {
        });
      });
      console.log('✨ Ai-API 跳转 H5 · 蓝白圆角已准备 | 目标: /deepseek-chat/ , /n1n-chat/');
    })();
  </script>

  <noscript>
    <div style="color: #0a4c7e; text-align:center;">您的浏览器未启用JS，但不影响跳转功能。</div>
  </noscript>
</body>
</html>
